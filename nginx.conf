upstream chatgpt2api_backend {
    server app:80;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;
    client_body_timeout 120s;

    # 通用代理头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ==========================================
    # 图片生成 / 编辑
    # ==========================================
    location ~ ^/v1/images/ {
        proxy_pass http://chatgpt2api_backend;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # ==========================================
    # 聊天补全（含图片场景，SSE 流式）
    # ==========================================
    location /v1/chat/completions {
        proxy_pass http://chatgpt2api_backend;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # ==========================================
    # Responses（含图片场景）
    # ==========================================
    location /v1/responses {
        proxy_pass http://chatgpt2api_backend;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # ==========================================
    # Anthropic Messages
    # ==========================================
    location /v1/messages {
        proxy_pass http://chatgpt2api_backend;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # ==========================================
    # 搜索
    # ==========================================
    location /v1/search {
        proxy_pass http://chatgpt2api_backend;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # ==========================================
    # 图片任务（画图工作台，SSE 进度推送）
    # ==========================================
    location /api/image-tasks/ {
        proxy_pass http://chatgpt2api_backend;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # ==========================================
    # PPT / PSD 生成（耗时长）
    # ==========================================
    location ~ ^/v1/(ppt|psd)/ {
        proxy_pass http://chatgpt2api_backend;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # ==========================================
    # 可编辑文件任务查询 & 下载
    # ==========================================
    location ~ ^/(v1/editable-file-tasks|files/) {
        proxy_pass http://chatgpt2api_backend;
        proxy_read_timeout 300s;
    }

    # ==========================================
    # 模型列表
    # ==========================================
    location /v1/models {
        proxy_pass http://chatgpt2api_backend;
    }

    # ==========================================
    # 生成结果 — 图片 & 缩略图
    # ==========================================
    location ~ ^/(images/|image-thumbnails/) {
        proxy_pass http://chatgpt2api_backend;
        expires 24h;
        add_header Cache-Control "public, immutable";
    }

    # ==========================================
    # 认证（调用方需先登录拿 token）
    # ==========================================
    location /auth/login {
        proxy_pass http://chatgpt2api_backend;
    }

    # ==========================================
    # 健康检查 & 版本
    # ==========================================
    location /health {
        proxy_pass http://chatgpt2api_backend;
    }

    location /version {
        proxy_pass http://chatgpt2api_backend;
    }

    # ==========================================
    # 其余路径全部拒绝
    # 管理接口（/api/accounts /api/register /api/settings 等）
    # 只能通过 SSH 隧道直连 app 容器访问
    # ==========================================
    location / {
        return 403;
    }
}
